<!DOCTYPE html>
<html>

	<head>

		<title>Contact Form App</title>

		<link rel="stylesheet" href="./styles.css" />

	</head>

	<body>

		<div class="container">

			<h1>Contact Form</h1>

			<contact-form>

				<form id="contact-form" action="/submit-form" method="POST">

					<div class="form-group">
						<label for="name">Full Name *</label>
						<input class="input" type="text" id="name" name="name" required>
					</div>
					<div class="form-group">
						<label for="email">Email Address *</label>
						<input class="input" type="email" id="email" name="email" required>
					</div>
					<div class="form-group">
						<label for="message">Your Message *</label>
						<textarea class="input" id="message" name="message" rows="5" required></textarea>
					</div>

					<div class="form-group">
						<label for="foobar" aria-hidden="true">If human, leave empty.[to be hidden]</label>
						<input type="text" id="foobar" name="foobar" aria-hidden="true" tabindex="-1" autocomplete="off">
					</div>

					<div class="form-group">

						<button type="submit" id="submit-button">Send Message</button>

					</div>

					<p>* required</p>

					<div class="form-status" style="display: none;"></div>

				</form>

			</contact-form>

			<script src="./contact-form.js" type="module"></script>

		</body>

	</div>

</html>
